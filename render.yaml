services:
  - type: web
    name: personal-skin
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: personal-skin-db
          property: connectionString
      - key: FLASK_CONFIG
        value: production
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: FLASK_SECRET_KEY
        generateValue: true

databases:
  - name: personal-skin-db
    plan: starter

